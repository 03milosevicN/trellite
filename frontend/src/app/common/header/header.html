<div class="d-flex align-items-center justify-content-between w-100 px-3 py-2">


    <a class="d-flex align-items-center" href="#">
        <img ngSrc="/logo-icon.svg" alt="icon-logo" height="40" width="40" />
    </a>


    <form class="d-flex flex-grow-1 mx-3" role="search">
        <div class="input-group w-100">
            <input
                    class="form-control"
                    type="search"
                    placeholder="Search"
                    aria-label="Search"
            />
            <button class="btn btn-outline-success" type="submit">
                Search
            </button>
        </div>
    </form>


    @if (user()) {
        <a [routerLink]="['/u', user()?.userId]" class="d-inline-flex align-items-center justify-content-center rounded-circle text-white fw-bold" style="width: 40px; height: 40px; background-color: #0d6efd;">
            {{ user()?.firstName?.charAt(0) | uppercase}}
        </a>
    } @else {
        <a class="d-inline-flex align-items-center justify-content-center rounded-circle text-white fw-bold" style="width: 40px; height: 40px; background-color: #0d6efd;">
            <p>NaN</p>
        </a>
    }

</div>

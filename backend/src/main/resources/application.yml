spring:
    config:
        import: optional:file:.env[.properties]
    application:
        name: trellite
    datasource:
        password: ${POSTGRES_PASSWORD}
        url: ${POSTGRES_DB_URL}
        username: ${POSTGRES_USERNAME}
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
    mongodb:
        database: ${MONGODB_DB}
        port: ${MONGODB_PORT}
        uri: ${MONGODB_URI}

application:
    security:
        jwt:
            secret-key: ${JWT_SECRET_KEY}
            expiration-ms: ${JWT_EXPIRATION_MS}
            refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS}